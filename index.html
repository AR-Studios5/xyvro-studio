<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AATOY - Secure Made in India</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="splash">
        <h1 class="splash-logo">AATOY</h1>
        <p class="made-tag">Made in India 🇮🇳</p>
    </div>

    <div id="auth-screen" class="hidden">
        <div class="auth-box">
            <h1 class="brand">AATOY</h1>
            <p>Claim your unique ID & Password</p>
            <input type="text" id="usernameInput" placeholder="Username">
            <input type="password" id="passwordInput" placeholder="Password">
            <button id="loginBtn" onclick="handleSecureLogin()">Login / Sign Up</button>
            <p id="auth-error"></p>
        </div>
    </div>

    <div id="app" class="hidden">
        <header class="navbar">
            <h2 class="brand">AATOY</h2>
            <div class="header-actions">
                <input type="text" id="userSearch" placeholder="Search..." onkeyup="searchUsers()">
                <button class="icon-btn" onclick="toggleTheme()">🌓</button>
            </div>
        </header>

        <main id="home-page" class="page">
            <div id="feed-container"></div>
        </main>

        <main id="profile-page" class="page hidden">
            <div class="profile-header">
                <div class="profile-avatar"></div>
                <div class="profile-stats">
                    <h3 id="display-name">User</h3>
                    <p id="unique-tag">@username</p>
                    
                    <div class="view-counter" style="margin: 10px 0; font-size: 0.9rem; color: #888;">
                        👁️ <span id="visit-count">0</span> Total App Visits
                    </div>

                    <button class="edit-btn" onclick="logout()">Logout</button>
                </div>
            </div>
            <div class="profile-grid" id="profile-grid-container"></div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item" onclick="switchPage('home-page')">🏠</button>
            <button class="nav-item main-btn" onclick="addPost()">+</button>
            <button class="nav-item" onclick="switchPage('profile-page')">👤</button>
        </nav>
    </div>

    <script>
        // This function pings the CountAPI to increment and fetch the total views
        async function updateViewCount() {
            try {
                // Replace 'aatoy-app-2026' with any unique name you want
                const response = await fetch('https://api.countapi.xyz/hit/aatoy-app-2026/visits');
                const data = await response.json();
                document.getElementById('visit-count').innerText = data.value.toLocaleString();
            } catch (error) {
                console.log("Counter Error:", error);
            }
        }

        // Call the counter when the page loads
        window.addEventListener('load', updateViewCount);
    </script>

    <script src="script.js"></script>
</body>
</html>
